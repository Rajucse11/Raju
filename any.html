<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJU ULTRA JARVIS AI</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#00f0ff;
    text-shadow:0 0 20px #00f0ff;
}

#scene{
    width:100%;
    height:300px;
}

#text{
    margin:10px;
    color:#00ff99;
    font-size:18px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:25px;
    margin:10px;
    background:linear-gradient(45deg,#00f0ff,#0066ff);
    color:white;
}
</style>
</head>

<body>

<h1>🤖 RAJU ULTRA JARVIS AI</h1>

<div id="scene"></div>

<button onclick="startAI()">🎤 Start AI</button>

<p id="text">Say: Hey Raju</p>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>

<script>

// ================= 3D FACE =================
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,300);
document.getElementById("scene").appendChild(renderer.domElement);

let geo=new THREE.SphereGeometry(2,32,32);
let mat=new THREE.MeshBasicMaterial({color:0x00f0ff,wireframe:true});
let sphere=new THREE.Mesh(geo,mat);

scene.add(sphere);
camera.position.z=5;

function animate(){
    requestAnimationFrame(animate);
    sphere.rotation.y+=0.01;
    sphere.rotation.x+=0.005;
    renderer.render(scene,camera);
}
animate();

// ================= MEMORY =================
let memory = JSON.parse(localStorage.getItem("raju_memory")||"{}");

function saveMemory(k,v){
    memory[k]=v;
    localStorage.setItem("raju_memory",JSON.stringify(memory));
}

// ================= VOICE FIX =================
function speak(text,cb){
    let msg=new SpeechSynthesisUtterance(text);

    function load(){
        let v=speechSynthesis.getVoices().find(x=>x.lang.includes("hi"))||speechSynthesis.getVoices()[0];
        if(v) msg.voice=v;

        msg.lang="hi-IN";
        msg.rate=0.9;
        msg.pitch=1;

        msg.onend=()=>{if(cb)cb();};

        speechSynthesis.cancel();
        speechSynthesis.speak(msg);
    }

    if(speechSynthesis.getVoices().length===0){
        speechSynthesis.onvoiceschanged=load;
    }else load();
}

// ================= FLASHLIGHT =================
async function flash(){
    try{
        let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
        let track=stream.getVideoTracks()[0];
        if(track.applyConstraints){
            await track.applyConstraints({advanced:[{torch:true}]});
            speak("Flashlight ON");
        }
    }catch{
        speak("Flashlight not supported");
    }
}

// ================= APP OPEN =================
function openApp(name){
    let apps={
        whatsapp:"com.whatsapp",
        youtube:"com.google.android.youtube",
        instagram:"com.instagram.android",
        phone:"com.android.dialer"
    };

    if(apps[name]){
        window.location.href="intent://#Intent;package="+apps[name]+";end;";
    }else{
        speak("App not found");
    }
}

// ================= WHATSAPP =================
function whatsapp(num,msg){
    window.open("https://wa.me/"+num+"?text="+encodeURIComponent(msg));
}

// ================= CHATGPT BRAIN =================
let chatHistory=[];

async function aiBrain(text){

chatHistory.push({role:"user",content:text});

if(chatHistory.length>8) chatHistory.shift();

let res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer YOUR_API_KEY"
    },
    body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
            {role:"system",content:"You are RAJU JARVIS AI. Speak Hindi-English mix. Be short and smart."},
            ...chatHistory
        ]
    })
});

let data=await res.json();
let reply=data.choices[0].message.content;

chatHistory.push({role:"assistant",content:reply});

return reply;
}

// ================= SMART ENGINE =================
async function run(cmd){

document.getElementById("text").innerText=cmd;

// GOOGLE
if(cmd.includes("google")){
    speak("Opening Google",()=>open("https://google.com"));
}

// YOUTUBE
else if(cmd.includes("youtube")){
    speak("Opening YouTube",()=>open("https://youtube.com"));
}

// CALL
else if(cmd.includes("call")){
    let num=cmd.replace(/\D/g,"");
    if(num.length>=10){
        speak("Calling",()=>location.href="tel:"+num);
    }else speak("Number unclear");
}

// CALCULATE
else if(cmd.includes("calculate")){
    try{
        let r=eval(cmd.replace("calculate",""));
        speak("Result "+r);
    }catch{
        speak("Error");
    }
}

// FLASH
else if(cmd.includes("flash")||cmd.includes("light")){
    flash();
}

// WHATSAPP
else if(cmd.includes("whatsapp")){
    whatsapp("91XXXXXXXXXX","Hello from Jarvis");
}

// MEMORY
else if(cmd.includes("remember")){
    saveMemory("last",cmd);
    speak("Saved");
}

// 🤖 AI BRAIN MODE
else{
    let reply=await aiBrain(cmd);
    speak(reply);
}

}

// ================= VOICE =================
function startAI(){

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=new SR();

rec.lang="hi-IN";
rec.continuous=true;

speak("RAJU ULTRA AI activated");

rec.onresult=function(e){

let cmd=e.results[e.results.length-1][0].transcript.toLowerCase();

document.getElementById("text").innerText=cmd;

if(cmd.includes("hey raju")){
    speak("Yes boss");
}else{
    run(cmd);
}

};

rec.start();
}

</script>

</body>
</html>
