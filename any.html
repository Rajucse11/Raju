<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJU AI WORKING</title>

<style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}
h1{color:#00f0ff;}
button{
    padding:12px 20px;
    border-radius:25px;
    border:none;
    background:#00f0ff;
    color:black;
}
#box{margin-top:20px;color:#00ff99;}
</style>
</head>

<body>

<h1>🤖 RAJU AI (WORKING)</h1>

<button onclick="startAI()">🎤 Start</button>

<div id="box">Ready...</div>

<script>

// 🔊 FIXED VOICE (SAFE)
function speak(text,cb){
    let s = new SpeechSynthesisUtterance(text);

    function load(){
        let v = speechSynthesis.getVoices()[0];
        if(v) s.voice = v;

        s.lang="hi-IN";
        s.rate=0.9;

        s.onend=()=>{if(cb)cb();};

        speechSynthesis.cancel();
        speechSynthesis.speak(s);
    }

    if(speechSynthesis.getVoices().length===0){
        speechSynthesis.onvoiceschanged=load;
    }else load();
}

// 🌐 OPEN WEBSITE
function openSite(url){
    window.open(url,"_blank");
}

// 📞 CALL
function call(num){
    location.href="tel:"+num;
}

// 🧠 SIMPLE CALC
function calc(text){
    try{
        let r = Function("return "+text)();
        return r;
    }catch{
        return "error";
    }
}

// 🎤 AI
function startAI(){

let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SR){
    alert("Chrome use karo");
    return;
}

let rec = new SR();
rec.lang="hi-IN";
rec.continuous=true;

speak("AI started");

rec.onresult = function(e){

let cmd = e.results[e.results.length-1][0].transcript.toLowerCase();
document.getElementById("box").innerText = cmd;

// 🌐 GOOGLE
if(cmd.includes("google")){
    speak("opening google");
    openSite("https://google.com");
}

// ▶ YOUTUBE
else if(cmd.includes("youtube")){
    speak("opening youtube");
    openSite("https://youtube.com");
}

// 📞 CALL
else if(cmd.includes("call")){
    let num = cmd.replace(/\D/g,"");
    if(num.length>=10){
        speak("calling");
        call(num);
    }else speak("number wrong");
}

// 🧮 CALC
else if(cmd.includes("calculate")){
    let exp = cmd.replace("calculate","");
    let res = calc(exp);
    speak("result "+res);
}

// 🕒 TIME
else if(cmd.includes("time")){
    speak("time is "+new Date().toLocaleTimeString());
}

// 🔦 FLASH (simple message)
else if(cmd.includes("light")){
    speak("flashlight not supported in all phones");
}

// ❓ DEFAULT
else{
    speak("command not found");
}

};

rec.start();

}

</script>

</body>
</html>
