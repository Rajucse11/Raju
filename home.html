<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raju | Web Developer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

/* Background */
body{
  background:linear-gradient(135deg,#0d6efd,#6c63ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.card{
  background:white;
  padding:40px;
  text-align:center;
  border-radius:20px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* Profile Image */
.card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #0d6efd;
}

/* Name */
.card h1{
  margin-top:15px;
  color:#0d6efd;
}

/* Typing Text */
.typing{
  font-size:18px;
  margin-top:10px;
  min-height:25px;
  color:#333;
}

/* Cursor */
.cursor{
  display:inline-block;
  width:3px;
  background:#0d6efd;
  margin-left:5px;
  animation:blink 0.7s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

p{
  margin-top:10px;
  color:#666;
  font-size:14px;
}
</style>

</head>

<body>

<div class="card">

  <!-- Profile Image (internet link) -->
  <img src="rs.png" alt="Profile">

  <h1>Raju & Sunny</h1>

  <div class="typing">
    <span id="text"></span>
    <span class="cursor"></span>
  </div>

  <p>I build modern responsive websites using HTML, CSS and JavaScript</p>

</div>

<script>
let text = "I am Web Developer & Web Designer";
let i = 0;

function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 120);
  }
}

typing();
</script>

</body>
</html>
