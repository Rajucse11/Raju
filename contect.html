<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Raju</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* Card */
.container{
  background:white;
  padding:30px;
  width:350px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* Title */
h2{
  text-align:center;
  color:#0d6efd;
  margin-bottom:15px;
}

/* Text */
p{
  text-align:center;
  color:#555;
  margin-bottom:10px;
  font-size:14px;
}

/* Inputs */
input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* Button */
button{
  width:100%;
  margin-top:15px;
  padding:10px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#084ed1;
}
</style>

</head>

<body>

<div class="container">

  <h2>Contact Me</h2>

  <p>Feel free to send me a message</p>

  <p>📍 Bihar, India</p>
  <p>📧 rajukumarcse83@gmail.com</p>
  <p>📞 +91 9939171583</p>

  <input type="text" placeholder="Your Name">
  <input type="email" placeholder="Your Email">
  <textarea rows="4" placeholder="Your Message"></textarea>

  <button>Send Message</button>

</div>

</body>
</html>
